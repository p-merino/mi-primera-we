<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loggin html</title>
</head>
<body>
    <header>
        <h1>Mi Primera Página Web</h1>
        <p>Bienvenido a mi sitio</p>
    </header>
    
    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#sobre">Sobre mí</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>
    
    <main>
        <section id="inicio">
            <h2>Bienvenida</h2>
            <p>Esta es mi primera página web.</p>
        </section>

        <section>
            <form action="get" method="">
                <fieldset>
                <legend><u>Formulario</u></legend>
                <label for="id_user">USER:</label>
                <input type="text" name="nombre" id="id_user" required>
                <br>
                <label for="id_pass">PASSWORD:</label>
                <input type="password" id="id_pass" required>
                <br>
                <input type="submit" value="ENVIAR">
            </form>
        </section>
        
        <section id="sobre">
            <h2>Sobre mí</h2>
            <p>Soy un desarrollador web principiante.</p>
        </section>
        
        <section id="contacto">
            <h2>Contacto</h2>
            <p>Email: contacto@ejemplo.com</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Mi Primera Página Web</p>
    </footer>
</body>
</html>
